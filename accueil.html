<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Accueil</title>

    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            padding:30px;
        }

        h1{
            color:#2c3e50;
            margin-bottom:20px;
        }

        .card{
            background:#ecf0f1;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        p{
            font-size:18px;
            margin-top:10px;
        }
    </style>

</head>

<body>
<div class="card">

    <h1>
        Bienvenue
    </h1>

    <p id="message"></p>

</div>

<script>

const user = JSON.parse(sessionStorage.getItem("user"));

document.getElementById("message").innerHTML =
"Bienvenue <b>" + user.nom + " " + user.prenom + "</b> dans votre espace.";

</script>

</body>

</html>
