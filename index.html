<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>Authentification</h1>

        <form id="loginForm">

            <div class="input-box">
                <label for="pseudo">Nom d'utilisateur</label>
                <input
                    type="text"
                    id="pseudo"
                    placeholder="Entrer votre pseudo"
                    required>
            </div>

            <div class="input-box">
                <label for="password">Mot de passe</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Entrer votre mot de passe"
                    required>
            </div>

            <div class="remember">
                <input
                    type="checkbox"
                    id="remember">
                <label for="remember">
                    Se rappeler de moi
                </label>
            </div>

            <button type="submit" id="btnLogin">
                LOGIN
            </button>

            <ul id="errors"></ul>

        </form>

        <p>
            <a href="createAccount.html">
                Create an account
            </a>
        </p>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
