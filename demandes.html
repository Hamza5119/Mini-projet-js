<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Gestion des Demandes</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

    <h1>Gestion des Demandes</h1>

    <form id="demandeForm">

        <div class="input-box">
            <label>Titre</label>
            <input type="text" id="titre" required>
        </div>

        <div class="input-box">
            <label>Description</label>
            <textarea id="description" rows="5" required></textarea>
        </div>

        <button type="submit">
            Envoyer la demande
        </button>

    </form>

    <br>

    <table border="1" width="100%">

        <thead>

        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Statut</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody id="tbody">

        </tbody>

    </table>

</div>

<script src="../js/demandes.js"></script>

</body>

</html>
