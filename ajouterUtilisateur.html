<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Ajouter Utilisateur</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

    <h1>Ajouter Utilisateur</h1>

    <form id="addForm">

        <div class="input-box">
            <label>Nom</label>
            <input type="text" id="nom" required>
        </div>

        <div class="input-box">
            <label>Prénom</label>
            <input type="text" id="prenom" required>
        </div>

        <div class="input-box">
            <label>Âge</label>
            <input type="number" id="age" required>
        </div>

        <div class="input-box">
            <label>Pseudo</label>
            <input type="text" id="pseudo" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-box">
            <label>Mot de passe</label>
            <input type="password" id="password" required>
        </div>

        <div class="input-box">
            <label>Pays</label>
            <input type="text" id="pays">
        </div>

        <div class="input-box">
            <label>Devise</label>
            <input type="text" id="devise">
        </div>

        <div class="input-box">
            <label>Couleur</label>
            <input type="color" id="couleur" value="#800000">
        </div>

        <div class="input-box">
            <label>Admin</label>

            <select id="admin">
                <option value="false">Visiteur</option>
                <option value="true">Admin</option>
            </select>

        </div>

        <button type="submit">
            Ajouter
        </button>

    </form>

</div>

<script>

const api="https://670ed5b73e7151861655eaa3.mockapi.io/Stagiaire";

document.getElementById("addForm").addEventListener("submit",function(e){

e.preventDefault();

const utilisateur={

nom:document.getElementById("nom").value,
prenom:document.getElementById("prenom").value,
age:document.getElementById("age").value,
pseudo:document.getElementById("pseudo").value,
email:document.getElementById("email").value,
MotDePasse:document.getElementById("password").value,
Pays:document.getElementById("pays").value,
Devise:document.getElementById("devise").value,
couleur:document.getElementById("couleur").value,
admin:document.getElementById("admin").value==="true"

};

fetch(api,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(utilisateur)

})

.then(()=>{

alert("Utilisateur ajouté avec succès");

window.location.href="listeUtilisateurs.html";

});

});

</script>

</body>
</html>
